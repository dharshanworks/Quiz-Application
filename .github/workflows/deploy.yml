name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --no-fix || true

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo "Total size:"
          du -sh dist/

      - name: Deploy to EC2 via SSH
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'dist/'
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USER }}
          REMOTE_PORT: ${{ secrets.EC2_PORT }}
          TARGET: '/var/www/main-quiz/'
          SCRIPT_BEFORE: |
            echo "=== Starting Deployment ==="
            echo "Backing up current build..."
            if [ -d "/var/www/main-quiz" ] && [ "$(ls -A /var/www/main-quiz 2>/dev/null)" ]; then
              rm -rf /var/www/main-quiz-backup
              cp -r /var/www/main-quiz /var/www/main-quiz-backup
              echo "Backup created"
            else
              echo "No existing build to backup"
            fi
          SCRIPT_AFTER: |
            echo "=== Finalizing Deployment ==="
            sudo systemctl restart nginx
            echo "Nginx restarted"
            
            echo "Running health check..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check PASSED (HTTP $HTTP_CODE)"
            else
              echo "✗ Health check FAILED (HTTP $HTTP_CODE)"
              echo "Rolling back..."
              rm -rf /var/www/main-quiz/*
              cp -r /var/www/main-quiz-backup/* /var/www/main-quiz/
              sudo systemctl restart nginx
              echo "Rollback complete"
              exit 1
            fi

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "App URL: http://${{ secrets.EC2_HOST }}"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check GitHub Actions logs for details"
          echo "Manual rollback: ssh into EC2 and run bash ~/deploy.sh with backup"

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo "Total size:"
          du -sh dist/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            echo "=== Starting Deployment ==="
            
            DEPLOY_DIR="/var/www/main-quiz"
            BACKUP_DIR="/var/www/main-quiz-backup"
            TEMP_DIR="/tmp/main-quiz-deploy"
            
            # Create directories with proper permissions
            sudo mkdir -p $DEPLOY_DIR $BACKUP_DIR $TEMP_DIR
            sudo chown -R ubuntu:ubuntu $DEPLOY_DIR $BACKUP_DIR $TEMP_DIR
            
            # Backup current build
            if [ "$(ls -A $DEPLOY_DIR 2>/dev/null)" ]; then
              rm -rf $BACKUP_DIR
              cp -r $DEPLOY_DIR $BACKUP_DIR
              echo "Backup created"
            fi
            
            # Clean temp dir
            rm -rf $TEMP_DIR/*
            
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "dist/*"
          target: "/tmp/main-quiz-deploy/"
          strip_components: 0
          overwrite: true

      - name: Finalize deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            DEPLOY_DIR="/var/www/main-quiz"
            BACKUP_DIR="/var/www/main-quiz-backup"
            TEMP_DIR="/tmp/main-quiz-deploy"
            
            echo "=== Moving files to deployment ==="
            rm -rf $DEPLOY_DIR/*
            cp -r $TEMP_DIR/* $DEPLOY_DIR/
            
            echo "=== Restarting Nginx ==="
            sudo systemctl restart nginx
            
            echo "=== Health Check ==="
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "SUCCESS: Health check passed (HTTP $HTTP_CODE)"
            else
              echo "FAILED: Health check failed (HTTP $HTTP_CODE)"
              echo "Rolling back..."
              rm -rf $DEPLOY_DIR/*
              cp -r $BACKUP_DIR/* $DEPLOY_DIR/
              sudo systemctl restart nginx
              echo "Rollback complete"
              exit 1
            fi
            
            # Cleanup
            rm -rf $TEMP_DIR
            
            echo "=== Deployment Complete ==="
            echo "URL: http://$(curl -s ifconfig.me)"

      - name: Deployment Success
        if: success()
        run: echo "Deployed successfully to ${{ secrets.EC2_HOST }}"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Check logs above for details"
          echo "SSH into EC2 to manually rollback if needed"
